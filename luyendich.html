<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện dịch</title>
<link rel="stylesheet" href="style.css">
<style>
/* Style riêng của trang luyện dịch, không ảnh hưởng file khác */
.layout { display: flex; min-height: 100vh; }
.main   { flex: 1; transition: margin-right .25s; min-width: 0; }
.main.sidebar-open { margin-right: 280px; }

.ex-box { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
.ex-header { padding: 14px 20px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: space-between; }
.ex-title  { font-size: 14px; font-weight: 600; }
.ex-body   { padding: 20px; background: var(--card); }

.trans-area { width: 100%; min-height: 110px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-md); font-size: 14px; font-family: inherit; resize: vertical; outline: none; line-height: 1.7; transition: border .15s, box-shadow .15s; }
.trans-area:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }

.action-row { margin-top: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.ex-selector { margin-bottom: 20px; }
</style>
</head>
<body>
<div class="layout">

  <!-- MAIN -->
  <div class="main" id="mainArea">
    <div class="main-content">

      <!-- DEV: Thêm bài -->
      <div id="devAddWrap" style="display:none">
        <button class="dev-add-btn" onclick="toggleDevForm()">＋ Thêm / Sửa bài</button>
        <div id="devForm" style="display:none" class="dev-panel">
          <div class="dev-panel-title">🛠️ Thêm / Sửa bài tập luyện dịch</div>
          <div class="form-group">
            <label class="form-label">Tên bài</label>
            <input class="inp" id="devTen" placeholder="VD: Unit 5 - Daily Routines">
          </div>
          <div class="form-group">
            <label class="form-label">Văn bản gốc (Enter = xuống hàng, hiển thị đúng như nhập)</label>
            <textarea class="textarea" id="devVanBan" style="min-height:120px" placeholder="Dán văn bản tiếng Anh vào đây..."></textarea>
          </div>
          <div class="syn-dev-wrap">
            <div class="form-group" style="margin:0">
              <label class="form-label">Từ đồng nghĩa cần tìm (mỗi từ 1 dòng)</label>
              <textarea class="textarea" id="devSynTA" style="min-height:180px" placeholder="happy&#10;sad&#10;angry&#10;..."></textarea>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Đáp án tương ứng (mỗi dòng khớp với từ bên trái)</label>
              <textarea class="textarea" id="devAnsTA" style="min-height:180px" placeholder="joyful&#10;unhappy&#10;furious&#10;..."></textarea>
            </div>
          </div>
          <div class="flex gap-8 flex-wrap mt-12">
            <button class="btn btn-primary" onclick="saveExercise()">💾 Lưu bài</button>
            <button class="btn btn-red" onclick="deleteExercise()">🗑 Xóa bài này</button>
            <button class="btn btn-ghost" onclick="toggleDevForm()">Đóng</button>
          </div>
          <div id="devMsg" class="mt-8" style="font-size:12px;"></div>
        </div>
      </div>

      <!-- Chọn bài -->
      <div class="ex-selector">
        <label class="label mb-8 flex">Chọn bài luyện tập</label>
        <select class="inp" id="exSelect" onchange="loadExercise(this.value)">
          <option value="">— Chọn bài —</option>
        </select>
      </div>

      <!-- Nội dung bài -->
      <div id="exContent">
        <div style="padding:60px;text-align:center;color:var(--muted)">
          <div style="font-size:36px;margin-bottom:12px">📄</div>
          Chọn bài luyện tập để bắt đầu
        </div>
      </div>

    </div>
  </div>

  <!-- SIDEBAR TỪ VỰNG -->
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-title">📌 Từ vựng đã chọn</div>
      <div class="sb-count" id="sbCount">0/35</div>
    </div>
    <div class="sb-list" id="sbList">
      <div class="sb-empty">Bôi đen từ trong bài để thêm vào đây</div>
    </div>
    <div class="sb-foot">
      <button class="btn btn-primary btn-block" onclick="saveAllVocab()">💾 Lưu tất cả vào kho</button>
      <div class="sb-warn" id="sbWarn"></div>
    </div>
  </div>
  <div class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">◀</div>
</div>

<!-- Selection tooltip -->
<div class="sel-tooltip" id="selTooltip">
  <div class="sel-meaning" id="selMeaning"></div>
  <div class="sel-original" id="selOriginal"></div>
  <button class="sel-add-btn" onclick="addToSidebar()">+ Thêm vào từ vựng</button>
</div>

<script>
const params     = new URLSearchParams(window.location.search);
const maHV       = params.get('maHV')  || '';
const tenHV      = params.get('tenHV') || '';
const isDev      = params.get('isDev') === '1';
const SCRIPT_URL = params.get('apiUrl') || 'https://script.google.com/macros/s/AKfycby7eN5exZWC7VjDTfgduL8ZEqR0RsnykP3gNhozvvNxI41MDLLGvZoX99BE2c9ZMXE_Fw/exec';

let savedWords = [], currentExercise = null, selWord = '', selMeaning = '';
let sidebarOpen = false, editingId = null;

async function apiGet(action, p) {
  const url = new URL(SCRIPT_URL);
  url.searchParams.set('action', action);
  Object.entries(p || {}).forEach(([k,v]) => url.searchParams.set(k, v));
  return (await fetch(url)).json();
}
async function apiPost(body) {
  return (await fetch(SCRIPT_URL, {
    method: 'POST', headers: {'Content-Type':'text/plain'},
    body: JSON.stringify(body)
  })).json();
}

async function init() {
  if (isDev) document.getElementById('devAddWrap').style.display = 'block';
  await loadExerciseList();
}

async function loadExerciseList() {
  const list = await apiGet('getExercises');
  const sel  = document.getElementById('exSelect');
  sel.innerHTML = '<option value="">— Chọn bài —</option>' +
    list.map(e => `<option value="${e.id}">${e.ten}</option>`).join('');
}

async function loadExercise(id) {
  editingId = id;
  if (!id) { document.getElementById('exContent').innerHTML = '<div style="padding:60px;text-align:center;color:var(--muted)"><div style="font-size:36px;margin-bottom:12px">📄</div>Chọn bài luyện tập để bắt đầu</div>'; return; }
  document.getElementById('exContent').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Đang tải bài...</div>';
  const ex = await apiGet('getExercise', { id });
  if (ex.error) { document.getElementById('exContent').innerHTML = '<div style="padding:40px;text-align:center;color:var(--red-dark)">' + ex.error + '</div>'; return; }
  currentExercise = ex;
  if (isDev) fillDevForm(ex);
  renderExercise(ex);
}

function renderExercise(ex) {
  const tuDN = ex.tuDongNghia ? ex.tuDongNghia.split('|').map(s => s.trim()).filter(Boolean) : [];
  const synHtml = tuDN.length ? `
    <div class="divider"></div>
    <div class="label mb-12">Tìm từ đồng nghĩa (${tuDN.length} từ)</div>
    <div class="syn-list">${tuDN.map((t,i) => `
      <div class="syn-item">
        <span class="syn-no">${i+1}.</span>
        <span class="syn-word">${t}</span>
        <input class="inp syn-inp" id="syn-${i}" placeholder="Từ đồng nghĩa...">
      </div>`).join('')}
    </div>
    <button class="btn btn-amber" onclick="showAnswers()" data-tip="Xem đáp án">Xem đáp án</button>
    <div class="ans-box" id="ansBox"></div>` : '';

  document.getElementById('exContent').innerHTML = `
    <div class="ex-box" id="printArea">
      <div class="ex-header">
        <div class="ex-title">${ex.ten}</div>
        <span class="badge" style="background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)">Luyện dịch</span>
      </div>
      <div class="ex-body">
        <div class="label mb-12">Văn bản gốc</div>
        <div class="van-ban" id="vanBanEl"></div>
        <div class="divider"></div>
        <div class="label mb-8">Bài dịch của bạn</div>
        <textarea class="trans-area" id="transInput" placeholder="Nhập bản dịch của bạn vào đây..."></textarea>
        <div class="action-row">
          <button class="btn btn-primary" data-tip="Nộp và nhận gợi ý từ AI" onclick="submitTranslation()">Nộp bài</button>
          <button class="btn btn-ghost" onclick="copyContent()">📋 Sao chép</button>
          <button class="btn btn-ghost" onclick="window.print()">🖨️ Xuất PDF</button>
        </div>
        <div class="ai-box" id="aiBox">
          <div class="ai-head">🤖 Nhận xét từ AI</div>
          <div class="ai-body" id="aiBody"></div>
        </div>
        ${synHtml}
      </div>
    </div>`;

  document.getElementById('vanBanEl').textContent = ex.vanBan;
  document.getElementById('vanBanEl').addEventListener('mouseup', handleTextSelect);
}

// ====== SELECTION & DỊCH ======
async function handleTextSelect() {
  const sel  = window.getSelection();
  const text = sel ? sel.toString().trim() : '';
  if (!text || text.split(' ').length > 8) { hideTip(); return; }
  selWord = text; selMeaning = 'Đang dịch…';
  showSelTip(selWord, 'Đang dịch…');
  try {
    const res = await (await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|vi`)).json();
    selMeaning = res.responseData?.translatedText || text;
    showSelTip(selWord, selMeaning);
  } catch { selMeaning = '(không dịch được)'; showSelTip(selWord, selMeaning); }
}
function showSelTip(word, meaning) {
  const tip  = document.getElementById('selTooltip');
  document.getElementById('selMeaning').textContent  = meaning;
  document.getElementById('selOriginal').textContent = word;
  const sel  = window.getSelection();
  if (!sel.rangeCount) return;
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  tip.style.display = 'block';
  tip.style.left = Math.min(rect.left, window.innerWidth - 290) + 'px';
  tip.style.top  = (rect.top + window.scrollY - 100) + 'px';
}
function hideTip() { document.getElementById('selTooltip').style.display = 'none'; }
document.addEventListener('mousedown', e => {
  if (!document.getElementById('selTooltip').contains(e.target)) hideTip();
});

// ====== SIDEBAR ======
function addToSidebar() {
  if (!selWord) return;
  if (savedWords.length >= 35) { document.getElementById('sbWarn').textContent = 'Đã đủ 35 từ, xóa bớt trước khi thêm.'; return; }
  if (savedWords.find(w => w.word.toLowerCase() === selWord.toLowerCase())) { hideTip(); return; }
  savedWords.push({ word: selWord, meaning: selMeaning });
  renderSidebar(); hideTip();
}
function renderSidebar() {
  document.getElementById('sbCount').textContent = savedWords.length + '/35';
  const list = document.getElementById('sbList');
  if (!savedWords.length) { list.innerHTML = '<div class="sb-empty">Bôi đen từ trong bài để thêm vào đây</div>'; return; }
  list.innerHTML = savedWords.map((w,i) => `
    <div class="sb-item">
      <div><div class="sb-word">${w.word}</div><div class="sb-mean">${w.meaning}</div></div>
      <button class="sb-del" onclick="removeWord(${i})">✕</button>
    </div>`).join('');
  document.getElementById('sbWarn').textContent = savedWords.length >= 35 ? 'Đã đủ 35 từ tối đa.' : '';
}
function removeWord(i) { savedWords.splice(i,1); renderSidebar(); }
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('mainArea').classList.toggle('sidebar-open', sidebarOpen);
  document.getElementById('sidebarToggle').classList.toggle('open', sidebarOpen);
  document.getElementById('sidebarToggle').textContent = sidebarOpen ? '▶' : '◀';
}
async function saveAllVocab() {
  if (!savedWords.length) { document.getElementById('sbWarn').textContent = 'Chưa có từ nào để lưu.'; return; }
  const rows = savedWords.map(w => ({ maHV, tenHV, tuVung: w.word, nghia: w.meaning, tenBai: currentExercise?.ten || '' }));
  const res  = await apiPost({ action: 'saveVocab', rows });
  const warn = document.getElementById('sbWarn');
  if (res.success) {
    warn.style.color = 'var(--green-text)';
    warn.textContent = '✓ Đã lưu ' + rows.length + ' từ!';
    setTimeout(() => { warn.textContent = ''; warn.style.color = ''; }, 3000);
  }
}

// ====== AI CHẤM BÀI ======
async function submitTranslation() {
  const baiDich = document.getElementById('transInput').value.trim();
  if (!baiDich) { alert('Nhập bản dịch trước!'); return; }
  if (!currentExercise) return;
  const aiBox = document.getElementById('aiBox');
  const aiBody = document.getElementById('aiBody');
  aiBox.style.display = 'block';
  aiBody.innerHTML = '<div class="ai-loading">🤖 AI đang chấm bài...</div>';
  const res = await apiPost({ action: 'gradeTranslation', vanBan: currentExercise.vanBan, baiDich });
  aiBody.textContent = res.error ? '⚠️ ' + res.error : (res.text || 'Không nhận được phản hồi.');
  if (!res.error && maHV) {
    apiPost({ action: 'logActivity', maHV, tenHV, loai: 'Luyện dịch', bai: currentExercise.ten, diem: {} }).catch(() => {});
  }
}

// ====== TỪ ĐỒNG NGHĨA ======
function showAnswers() {
  if (!currentExercise) return;
  const dapAn = currentExercise.dapAnDongNghia ? currentExercise.dapAnDongNghia.split('|').map(s=>s.trim()) : [];
  const tuDN  = currentExercise.tuDongNghia    ? currentExercise.tuDongNghia.split('|').map(s=>s.trim())    : [];
  const box   = document.getElementById('ansBox');
  box.style.display = 'block';
  box.innerHTML = '<div class="ans-lbl">Đáp án</div>' +
    tuDN.map((t,i) => `<div class="ans-row"><span class="ans-word">${t}</span><span class="ans-val">→ ${dapAn[i]||'?'}</span></div>`).join('');
}

// ====== COPY ======
function copyContent() {
  if (!currentExercise) return;
  const baiDich = document.getElementById('transInput')?.value || '';
  const aiText  = document.getElementById('aiBody')?.textContent || '';
  let text = currentExercise.vanBan + '\n\n--- Bản dịch ---\n' + baiDich;
  if (aiText && !aiText.includes('đang chấm')) text += '\n\n--- Nhận xét AI ---\n' + aiText;
  navigator.clipboard.writeText(text).then(() => alert('Đã sao chép!'));
}

// ====== DEV FORM ======
function toggleDevForm() {
  const f = document.getElementById('devForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  if (f.style.display === 'block' && !editingId) clearDevForm();
}
function fillDevForm(ex) {
  document.getElementById('devTen').value    = ex.ten    || '';
  document.getElementById('devVanBan').value = ex.vanBan || '';
  document.getElementById('devSynTA').value  = ex.tuDongNghia    ? ex.tuDongNghia.split('|').map(s=>s.trim()).join('\n')    : '';
  document.getElementById('devAnsTA').value  = ex.dapAnDongNghia ? ex.dapAnDongNghia.split('|').map(s=>s.trim()).join('\n') : '';
}
function clearDevForm() {
  ['devTen','devVanBan','devSynTA','devAnsTA'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  editingId = null;
}
async function saveExercise() {
  const ten    = document.getElementById('devTen').value.trim();
  const vanBan = document.getElementById('devVanBan').value.trim();
  if (!ten || !vanBan) { showDevMsg('Nhập tên bài và văn bản!', false); return; }
  const syns = document.getElementById('devSynTA').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const ans  = document.getElementById('devAnsTA').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const res  = await apiPost({ action: 'saveExercise', data: { id: editingId||'', ten, loai:'luyen-dich', vanBan, tuDongNghia: syns.join('|'), dapAnDongNghia: ans.join('|') } });
  if (res.success) { showDevMsg('✓ Đã lưu!', true); await loadExerciseList(); if(res.id) editingId=res.id; }
  else showDevMsg(res.error || 'Lỗi!', false);
}
async function deleteExercise() {
  if (!editingId) { showDevMsg('Chưa chọn bài để xóa!', false); return; }
  if (!confirm('Xóa bài này?')) return;
  const res = await apiPost({ action: 'deleteExercise', id: editingId });
  if (res.success) {
    clearDevForm(); toggleDevForm(); await loadExerciseList();
    document.getElementById('exContent').innerHTML = '<div style="padding:60px;text-align:center;color:var(--muted)"><div style="font-size:36px;margin-bottom:12px">📄</div>Chọn bài luyện tập để bắt đầu</div>';
  }
}
function showDevMsg(msg, ok) {
  const el = document.getElementById('devMsg');
  el.textContent = msg;
  el.style.color = ok ? 'var(--green-text)' : 'var(--red-dark)';
  setTimeout(() => el.textContent = '', 3000);
}

init();
</script>
</body>
</html>
