<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp luyện đề</title>
<link rel="stylesheet" href="style.css">
<style>
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px;}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:20px;}

.lesson-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
}
.lesson-btn{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);padding:16px 14px;cursor:pointer;text-align:left;
  font-family:inherit;transition:box-shadow .15s,border-color .15s,transform .1s;
}
.lesson-btn:hover{border-color:var(--primary);box-shadow:var(--shadow-md);}
.lesson-btn:active{transform:scale(.98);}
.lesson-title{font-weight:600;font-size:14px;line-height:1.4;}
.lesson-meta{font-size:12px;color:var(--muted);margin-top:6px;}

.older-link{
  display:block;text-align:center;margin-top:20px;font-size:14px;color:var(--primary);
  font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;width:100%;padding:10px;
}
.older-link:hover{text-decoration:underline;}
.empty-state{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;}

@media (max-width:420px){
  .lesson-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-title">🎯 Lớp luyện đề</div>
  <div class="page-sub">Chọn 1 bài để mở, làm xong nhớ bấm "Hoàn thành" trong bài để lưu lại nhé.</div>
  <div id="lessonGrid" class="lesson-grid"></div>
  <button class="older-link" id="olderBtn" style="display:none" onclick="showMore()">Cũ hơn</button>
</div>

<script>
const params     = new URLSearchParams(window.location.search);
const maHV       = params.get('maHV')  || '';
const tenHV      = params.get('tenHV') || '';
const SCRIPT_URL = params.get('apiUrl') || 'https://script.google.com/macros/s/AKfycbyDVGTlWSWoAEtAMfv4PAAIZkMLudH_QOiomldb1mx69zR_mk6UAS8AjRTmOfg3wCPiZQ/exec';

// Thư mục chứa file bài học trên Git — đổi 1 chỗ duy nhất nếu sau này đổi tên thư mục
const FOLDER = 'lopluyende/';
const PAGE_SIZE = 12;

let allLessons = [];
let visibleCount = PAGE_SIZE;

async function apiGet(action, p) {
  const url = new URL(SCRIPT_URL);
  url.searchParams.set('action', action);
  Object.entries(p || {}).forEach(([k, v]) => url.searchParams.set(k, v));
  return (await fetch(url)).json();
}

async function loadLessons() {
  allLessons = await apiGet('getLopLuyenDeCatalog') || [];
  render();
}

function render() {
  const grid = document.getElementById('lessonGrid');
  const older = document.getElementById('olderBtn');
  if (!allLessons.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Chưa có bài nào.</div>';
    older.style.display = 'none';
    return;
  }
  const shown = allLessons.slice(0, visibleCount);
  grid.innerHTML = shown.map(l => `
    <button class="lesson-btn" onclick="openLesson('${esc(l.file)}','${esc(l.ten)}')">
      <div class="lesson-title">${l.ten}</div>
      <div class="lesson-meta">${l.ngay}</div>
    </button>`).join('');
  older.style.display = visibleCount < allLessons.length ? 'block' : 'none';
}

function showMore() {
  visibleCount += PAGE_SIZE;
  render();
}

function esc(s) { return (s || '').replace(/'/g, "\\'"); }

function openLesson(file, ten) {
  const p = new URLSearchParams({
    ma: maHV, ten: tenHV, loai: 'Lớp luyện đề', bai: ten, apiUrl: SCRIPT_URL
  });
  window.open(FOLDER + file + '?' + p.toString(), '_blank');
}

loadLessons();
</script>
</body>
</html>
