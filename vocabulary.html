<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ vựng của tôi</title>
<link rel="stylesheet" href="style.css">
</head>
<body style="background:var(--bg)">
<div class="main-content">
  <div class="flex-between mb-16">
    <div>
      <h2>Từ vựng của tôi</h2>
      <p class="text-muted mt-4">Xem và quản lý từ vựng bạn đã lưu từ các bài luyện tập</p>
    </div>
    <span class="badge badge-primary" id="userInfo">Đang tải...</span>
  </div>

  <div class="card" style="padding:60px;text-align:center">
    <div style="font-size:40px;margin-bottom:16px">📚</div>
    <h3 class="mb-8">Tính năng đang được xây dựng</h3>
    <p class="text-muted" style="font-size:13px;line-height:1.7">
      Từ vựng bạn lưu trong các bài luyện tập sẽ xuất hiện ở đây.<br>
      Bạn có thể xem theo bài, tìm kiếm và luyện tập lại.
    </p>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const maHV   = params.get('maHV')  || '';
const tenHV  = params.get('tenHV') || '';
document.getElementById('userInfo').textContent = tenHV + ' · ' + maHV;
</script>
</body>
</html>
